# GoReleaser configuration for hostodo-cli
version: 2

before:
  hooks:
    - go mod tidy
    - go mod download

builds:
  - id: odo
    binary: odo
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/hostodo/hostodo-cli/cmd.Version={{.Version}}
      - -X github.com/hostodo/hostodo-cli/cmd.Commit={{.Commit}}
      - -X github.com/hostodo/hostodo-cli/cmd.Date={{.Date}}
    flags:
      - -trimpath

archives:
  - id: odo
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch
  groups:
    - title: 'New Features'
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: 'Bug Fixes'
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: 'Performance Improvements'
      regexp: '^.*?perf(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: 'Other Changes'
      order: 999

# Homebrew formula
brews:
  - name: odo
    repository:
      owner: hostodo
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/hostodo/cli"
    description: "Official CLI for managing Hostodo VPS instances"
    license: "MIT"
    install: |
      bin.install "odo"
      generate_completions_from_executable(bin/"odo", "completion")
    test: |
      system "#{bin}/odo", "--version"

release:
  github:
    owner: hostodo
    name: cli
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"

# Universal binaries for macOS (combines Intel + ARM)
universal_binaries:
  - id: odo
    replace: true
    name_template: 'odo'

# Linux packages
nfpms:
  - id: odo
    package_name: odo
    vendor: Hostodo
    homepage: https://hostodo.com
    maintainer: Hostodo Team <support@hostodo.com>
    description: Official CLI for managing Hostodo VPS instances
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/bin
